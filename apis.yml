name: Magic Eden
kind: company
description: Magic Eden is a multi-chain NFT marketplace offering REST and instruction-generation
  APIs for Solana, EVM chains (Ethereum, Polygon, Base, ApeChain, Arbitrum, Berachain,
  BSC, SEI, Abstract), and Bitcoin Ordinals (inscriptions, rare sats, and runes).
  Developers can fetch collections, tokens, listings, bids, activity, holder stats,
  AMM pool data, launchpad data, and generate signed transactions or PSBTs for listing,
  buying, bidding, transferring, swapping, and minting across all supported chains.
