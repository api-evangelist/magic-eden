features:
  - name: Multi-chain marketplace coverage
    description: Single developer platform spanning Solana, ten EVM chains, and Bitcoin
      Ordinals / Runes from one set of API conventions.
  - name: Signed-transaction instruction APIs
    description: Server-side generation of unsigned Solana transactions, EVM EIP-712
      signing payloads, and Bitcoin PSBTs that clients co-sign and broadcast.
  - name: MMM AMM pool primitives
    description: Programmatic creation, deposit, fulfillment, update, and close of
      Magic Eden Market Maker (MMM) AMM pools on Solana.
  - name: Reservoir-powered EVM indexing
    description: EVM API surface built on Reservoir Protocol, exposing orderbook and
      asset data across all supported L1/L2 chains.
  - name: Runes lifecycle support
    description: End-to-end Bitcoin Runes APIs covering quotes, swaps, sweeping (buying),
      market sells, listing, and cancellation flows over PSBTs.
  - name: Launchpad APIs
    description: Endpoints for discovering launchpad collections and (via SDK) self-serve
      creation of new launchpads with mint stages, allowlists, and royalties.
useCases:
  - name: NFT analytics dashboards
    description: Aggregate floor prices, volumes, holder distributions, and activity
      across multi-chain collections.
  - name: Portfolio and wallet trackers
    description: Surface user holdings, listings, offers made/received, and escrow
      balances across Solana, EVM, and Bitcoin Ordinals from one provider.
  - name: Trading bots and snipers
    description: Programmatic buying, listing, bidding, and cancellation using the
      instruction-generation endpoints.
  - name: Aggregator marketplaces
    description: Pull Magic Eden listings and offers (via Reservoir-style asks/bids
      APIs) into third-party marketplace UIs.
  - name: AI agents and assistants
    description: LLM-friendly docs (llms.txt) plus official TypeScript SDK enable
      agent-driven NFT trading workflows.
  - name: Runes trading apps
    description: Build native Bitcoin Runes swap, sweep, and listing experiences on
      top of Magic Eden's PSBT generators.
integrations:
  - name: Reservoir Protocol
    description: EVM orderbook indexing layer powering the v4 EVM API.
  - name: Solana
    description: Primary chain with on-chain MMM AMM and Magic Eden v2/M3 marketplace
      programs.
  - name: Bitcoin / Ordinals Theory
    description: Native ordinals and runes protocol integration on Bitcoin.
  - name: Metaplex Core
    description: Solana NFT standard supported by the Magic Eden launchpad SDK.
  - name: HackerOne
    description: Public bug bounty program for security researchers.
  - name: Discord
    description: Developer and creator community.
  - name: Airtable
    description: Used for API key request intake (US and non-US forms).
solutions:
  - name: Magic Eden Marketplace
    description: Consumer NFT marketplace at magiceden.io / magiceden.us across all
      supported chains.
  - name: Magic Eden Launchpad
    description: Curated and self-serve NFT collection launch product with allowlist,
      mint stages, and royalties.
  - name: Magic Eden Wallet
    description: ME-branded multi-chain wallet (Solana, EVM, Bitcoin) with developer
      docs.
  - name: Magic Eden Diamonds
    description: Loyalty / rewards program tied to marketplace activity.
