description: Magic Eden does not publish a metered, paid developer API tier. Free
  public access is rate-limited per surface; higher access is granted on a per-key
  basis via the API key request forms. The primary monetisation surface is the marketplace
  itself (transaction fees and royalties), not the API. FinOps practices for consumers
  therefore focus on rate-budgeting and key-attribution rather than direct API spend.
notes: No public usage export API. Cost attribution must be implemented client-side
  per API key. Marketplace fees are a separate revenue stream not represented in this
  document.
sources:
  - https://docs.magiceden.io/reference/solana-api-keys
  - https://docs.magiceden.io/reference/evm-api-keys
  - https://docs.magiceden.io/reference/ordinals-api-keys
