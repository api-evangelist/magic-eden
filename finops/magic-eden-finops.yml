meters:
  - name: solana_requests
    description: Requests against the Solana API surface (v2).
    unit: request
    aggregation: sum
    dimensions:
      - api_key
      - endpoint
  - name: evm_requests
    description: Requests against the EVM v4 API surface.
    unit: request
    aggregation: sum
    dimensions:
      - api_key
      - chain
      - endpoint
  - name: ordinals_requests
    description: Requests against the Ordinals/Runes v2 API surface.
    unit: request
    aggregation: sum
    dimensions:
      - api_key
      - endpoint
  - name: instruction_calls
    description: Authenticated calls to instruction/transaction/PSBT generation endpoints.
    unit: request
    aggregation: sum
    dimensions:
      - api_key
      - chain
      - operation
principles:
  - name: Visibility
    description: Track request volumes and 429 rates per surface and per API key with
      client-side metrics.
  - name: Allocation
    description: Issue separate API keys per application/environment to attribute
      consumption.
  - name: Optimization
    description: Cache read endpoints aggressively; the marketplace data changes
      faster than wallet/collection metadata. Batch with inter-request delays. Prefer
      webhooks/streams where available (Geyser/Yellowstone, mempool.js) over polling.
  - name: Accountability
    description: Assign key ownership; review 429 burn and request growth monthly
      and re-request a higher tier via the API key form when needed.
maintainers:
