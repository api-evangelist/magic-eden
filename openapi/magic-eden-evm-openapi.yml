        continuation:
          type: string
          description: used to get next offset of items
      required:
      - assets
    getUserAssetsResponse:
      type: object
      properties:
        assets:
          type: array
          items:
            type: object
            properties:
              asset:
                $ref: '#/components/schemas/asset'
              floorAsk:
                $ref: '#/components/schemas/evmAssetAsk'
              topBid:
                $ref: '#/components/schemas/evmBid'
            required:
            - asset
            - ownership
        continuation:
          type: string
          description: used to get next offset of items
      required:
      - assets
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
tags: []
paths:
  /activities:
    get:
      summary: NFT Activity
      operationId: getNftActivity
      description: Use this API to get NFT activity
      parameters:
      - name: chain
        schema:
          $ref: '#/components/schemas/chainEnum'
        required: true
        in: query
      - name: activityTypes[]
        schema:
          type: array
          items:
            $ref: '#/components/schemas/nftActivityTypeEnum'
        required: true
        explode: true
        in: query
        description: The activity types to query
      - name: fromTime
        schema:
          type: string
        required: false
        in: query
        description: '`From time` of time range to query'
      - name: toTime
        schema:
          type: string
        required: false
        in: query
        description: '`To time` of time range to query'
      - name: assetId
        schema:
          type: string
        required: true
        in: query
        description: 'Asset Id to filter for activities. Either `assetId` or `collectionId` or `walletAddress` should be provided.
          example: `0xbd3531da5cf5857e7cfaa92426877b022e612cf8:0`'
      - name: collectionId
        schema:
          type: string
        required: true
        in: query
        description: 'Collection Id to filter for activities. Either `assetId` or `collectionId` or `walletAddress` should
          be provided. example: `0xbd3531da5cf5857e7cfaa92426877b022e612cf8`'
      - name: walletAddress
        schema:
          type: string
        required: true
        in: query
        description: 'User wallet address to filter for activities. Either `assetId` or `collectionId` or `walletAddress`
          should be provided. example: `0x47d88afbba889709abba07339ed1c88079944ca3`'
      - name: limit
        schema:
          type: number
          default: 20
          minimum: 1
          maximum: 100
        required: false
        in: query
        description: Amount of items returned, default to __20__
      - name: continuation
        schema:
          type: string
        required: false
        in: query
        description: Use continuation token to request next offset of items.
      tags:
      - Activity
      responses:
        '200':
          description: Successful
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/getNftActivityResponse'
      x-order: 7
  /collections:
    post:
      summary: Collections
      operationId: getCollections
      description: Use this API to explore a collection's metadata and statistics (sales, volume, etc).
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/getCollectionsRequest'
      tags:
      - Collections
      responses:
        '200':
          description: Successful
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/getCollectionsResponse'
      x-order: 1
  /collections/user-collections:
    post:
      summary: User Collections
      operationId: getUserCollections
      description: Use this API to explore a user's collections metadata and statistics (sales, volume, etc).
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/getUserCollectionsRequest'
      tags:
      - Collections
      responses:
        '200':
          description: Successful
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/getUserCollectionsResponse'
      x-order: 2
  /collections/search:
    post:
      summary: Search Collections
      operationId: searchCollections
      description: Use this API to do a fuzzy collection search
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/searchCollectionsRequest'
      tags:
      - Collections
      responses:
        '200':
          description: Successful
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/searchCollectionsResponse'
  /ixs/bid/get:
    post:
      summary: Create Bids (Get Signing Data)
      operationId: ixsBidGet
      description: Generate bids. This API is used to generate bid data to sign. Once you get signing data from this API,
        you shall sign them and post to another bid creation API to finish bid generation
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ixsBidGetRequest'
      tags:
      - Ixs
      responses:
        '200':
          description: Successful
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ixsBidGetResponse'
      x-order: 10
  /ixs/bid:
    post:
      summary: Create Bids (Creation)
      operationId: ixsBidPost
      description: Generate bids. This API is used to create bids with signature provided
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ixsBidPostRequest'
      tags:
      - Ixs
      responses:
        '200':
          description: Successful
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ixsBidPostResponse'
      x-order: 11
  /ixs/bulk-transfer/get:
    post:
      summary: Bulk Transfer
      operationId: ixsBulkTransferGet
      description: Bulk transfer assets(tokens). This API is used to generate asset bulk transfer transaction data
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ixsBulkTransferGetRequest'
      tags:
      - Ixs
      responses:
        '200':
          description: Successful
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ixsBulkTransferGetResponse'
      x-order: 14
  /ixs/buy/get:
    post:
      summary: Buy Assets
      operationId: ixsBuyGet
      description: Buy assets(tokens). This API is used to generate transaction data to buy assets
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ixsBuyGetRequest'
      tags:
      - Ixs
      responses:
        '200':
          description: Successful
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ixsBuyGetResponse'
      x-order: 15
  /ixs/cancel-order/get:
    post:
      summary: Cancel Orders (Get Signing Data)
      operationId: ixsCancelOrderGet
      description: Cancel Orders. This API is used to generate order cancellation data to sign. Once you get signing data
        from this API, you shall sign them and post to another order cancellation API to finish order cancellation
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ixsCancelOrderGetRequest'
      tags:
      - Ixs
      responses:
        '200':
          description: Successful
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ixsCancelOrderGetResponse'
      x-order: 12
  /ixs/cancel-order:
    post:
      summary: Cancel Orders (Cancellation)
      operationId: ixsCancelOrderPost
      description: Cancel Orders. This API is used to cancel orders with signature provided
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ixsCancelOrderPostRequest'
      tags:
      - Ixs
      responses:
        '200':
          description: Successful
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ixsCancelOrderPostResponse'
      x-order: 13
  /ixs/list/get:
    post:
      summary: Create Listings (Get Signing Data)
      operationId: ixsListGet
      description: Generate listings for assets (tokens). This API is used to generate listing data to sign. Once you get
        signing data from this API, you shall sign them and post to another listing creation API to finish listing generation
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ixsListGetRequest'
      tags:
      - Ixs
      responses:
        '200':
          description: Successful
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ixsListGetResponse'
      x-order: 8
  /ixs/list:
    post:
      summary: Create Listings (Creation)
      operationId: ixsListPost
      description: Generate listings for assets (tokens). This API is used to create listings with signature provided
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ixsListPostRequest'
      tags:
      - Ixs
      responses:
        '200':
          description: Successful
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ixsListPostResponse'
      x-order: 9
  /ixs/sell/get:
    post:
      summary: Sell Assets
      operationId: ixsSellGet
      description: Sell assets(tokens). This API is used to generate transaction data to sell assets
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ixsSellGetRequest'
      tags:
      - Ixs
      responses:
        '200':
          description: Successful
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ixsSellGetResponse'
      x-order: 16
  /orders/asks:
    get:
      summary: Asks (listings)
      operationId: getAsks
      description: Use this API to search asks
      parameters:
      - name: chain
        schema:
          $ref: '#/components/schemas/chainEnum'
        required: true
        in: query
      - name: ids[]
        schema:
          type: array
          items:
            type: string
          maxItems: 40
        in: query
        explode: true
        required: true
        description: Direct fetch asks by ids, other filters will be ignored if `ids` is provided. Either `ids` and `collectionId`
          must be provided
      - name: collectionId
        schema:
          type: string
        explode: true
        required: true
        in: query
        description: 'Filter by collectionId. example: `0xbd3531da5cf5857e7cfaa92426877b022e612cf8`. Either `ids` and `collectionId`
          must be provided'
      - name: assetIds[]
        schema:
          type: array
          items:
            type: string
          maxItems: 40
        explode: true
        required: false
        in: query
        description: 'Filter by asset ids. example: `0xbd3531da5cf5857e7cfaa92426877b022e612cf8:0`'
      - name: makers[]
        schema:
          type: array
          items:
            type: string
          maxItems: 40
        explode: true
        required: false
        in: query
        description: 'Filter by makers who made these asks. example: `0x47d88afbba889709abba07339ed1c88079944ca3`'
      - name: sources[]
        schema:
          type: array
          items:
            $ref: '#/components/schemas/filterOrderSourceEnum'
          maxItems: 5
        explode: true
        required: false
        in: query
        description: Filter by order source.
      - name: status[]
        schema:
          type: array
          items:
            $ref: '#/components/schemas/orderStatusEnum'
          maxItems: 5
        explode: true
        required: false
        in: query
        description: Filter by order status. default `active`
      - name: createAfter
        schema:
          type: string
        explode: true
        required: true
        in: query
        description: 'Filter orders after some create timestamp using UTC format. example: `2025-05-01T06:01:09.000Z`.'
      - name: updateAfter
        schema:
          type: string
        explode: true
        required: true
        in: query
        description: 'Filter orders after some update timestamp using UTC format. example: `2025-05-01T06:01:09.000Z`.'
      - name: sortBy
        schema:
          type: string
          enum:
          - price
          - createdAt
          - updatedAt
          default: price
        required: false
        in: query
      - name: sortDir
        schema:
          type: string
          enum:
          - asc
          - desc
          default: asc
        required: false
