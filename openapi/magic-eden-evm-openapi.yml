      - orderIds
      - maker
    ixsCancelOrderGetSuccessResponse:
      type: object
      allOf:
      - $ref: '#/components/schemas/ixsBaseSuccessResponse'
      properties:
        dataToSignAndPostList:
          type: array
          items:
            type: object
            properties:
              cancelOrderDataToSign:
                $ref: '#/components/schemas/ixsEip712SignData'
              postBody:
                type: string
                description: Base64 encoded data that need to be pass to cancellation API endpoint
            description: Order cancellation data to sign. Once signed, you should call the cancellatino API endpoint with
              signature to finish order cancellation.
        onchainCancellationTransactionToSign:
          type: array
          items:
            $ref: '#/components/schemas/ixsTransactionData'
