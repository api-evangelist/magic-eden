    ixsCancelOrderPostRequest:
      type: object
      properties:
        chain:
          $ref: '#/components/schemas/chainEnum'
        postBody:
          type: string
          description: Base64-encoded string stands for post body, which should come from signing data generation API endpoint
        signature:
          type: string
          description: Hex-ed string stands for signaure, which should come from signing data generation API endpoint
      required:
      - chain
      - postBody
      - signature
    ixsCancelOrderPostResponse:
      oneOf:
      - $ref: '#/components/schemas/ixsBaseErrorResponse'
      - $ref: '#/components/schemas/ixsBaseSuccessResponse'
    ixsListing:
      type: object
      properties:
        assetId:
          type: string
          example: 0xbd3531da5cf5857e7cfaa92426877b022e612cf8:0
          description: Asset id for listing, could be a ERC-721 or ERC-1155
        quantity:
          type: number
          description: Asset quantity to list, for ERC-721, must specified 1, for ERC-1155, could be > 1
          minimum: 1
        unitPrice:
          $ref: '#/components/schemas/ixsUnitPrice'
          description: Unit price per quantity
        royaltyBps:
          type: number
          description: Royalty bps to paid to creator for listing if there are
          minimum: 0
          maximum: 10000
        expirationInSeconds:
          type: number
          description: 'Expiration time (in seconds). Min: 15 minutes, Max: 1 year'
          minimum: 900
          maximum: 31536000
      required:
      - assetId
      - quantity
      - unitPrice
      - expirationInSeconds
    ixsListGetRequest:
      type: object
      properties:
        chain:
          $ref: '#/components/schemas/chainEnum'
        maker:
          type: string
          example: '0x079e5e1ac85b04225edad793ecdd9b31a26fdacc'
          description: listing maker, should be owner of these assets(tokens) that wish to be listed.
        listings:
          type: array
          items:
            $ref: '#/components/schemas/ixsListing'
          minItems: 1
          maxItems: 10
          description: listings to generate
      required:
      - chain
      - maker
      - listings
    ixsListGetErrorResponse:
      type: object
      allOf:
      - $ref: '#/components/schemas/ixsBaseErrorResponse'
    ixsListGetSuccessResponse:
      type: object
      allOf:
      - $ref: '#/components/schemas/ixsBaseSuccessResponse'
      properties:
        contractApprovalsNeeded:
          $ref: '#/components/schemas/ixsApprovals'
          description: Contract approvals needed to be signed before listing. This is for delegating MagicEden to move user's
            assets when listings are fulfilled
        dataToSignAndPostList:
          type: array
          items:
            type: object
            properties:
              listingDataToSign:
                $ref: '#/components/schemas/ixsEip712SignData'
              postBody:
                type: string
                description: Base64 encoded data that need to be pass to creation API endpoint
          description: Array of listing data to sign and post to listing creation API endpoint, you should call listing creation
            API endpoint for every item in this list with signed signature and post body
      required:
      - dataToSignAndPostList
    ixsListGetResponse:
      oneOf:
      - $ref: '#/components/schemas/ixsListGetErrorResponse'
      - $ref: '#/components/schemas/ixsListGetSuccessResponse'
    ixsListPostRequest:
      type: object
      properties:
        chain:
          $ref: '#/components/schemas/chainEnum'
        postBody:
          type: string
          description: Base64-encoded string stands for post body, which should come from signing data generation API endpoint
        signature:
          type: string
          description: Hex-ed string stands for signaure, which should come from signing data generation API endpoint
      required:
      - chain
      - postBody
      - signature
    ixsListPostErrorResponse:
      type: object
      allOf:
      - $ref: '#/components/schemas/ixsBaseErrorResponse'
    ixsListPostSuccessResponse:
      type: object
      allOf:
      - $ref: '#/components/schemas/ixsBaseSuccessResponse'
      properties:
        createdOrderIds:
          type: array
          items:
            type: string
          description: created listing ids
      required:
      - createdOrderIds
    ixsListPostResponse:
      oneOf:
      - $ref: '#/components/schemas/ixsListPostErrorResponse'
      - $ref: '#/components/schemas/ixsListPostSuccessResponse'
    ixsSellGetRequest:
      type: object
      properties:
        chain:
          $ref: '#/components/schemas/chainEnum'
        taker:
          type: string
          example: '0x079e5e1ac85b04225edad793ecdd9b31a26fdacc'
          description: Taker who wish to sell assets
        items:
          type: array
          items:
            type: object
            properties:
              assetId:
                type: string
              quantity:
                type: number
                minimum: 1
            required:
            - assetId
            - quantity
          minItems: 1
          maxItems: 10
          description: Assets to sell
      required:
      - chain
      - taker
      - items
    ixsSellGetSuccessResponse:
      type: object
      allOf:
      - $ref: '#/components/schemas/ixsBaseSuccessResponse'
      properties:
        contractApprovalsNeeded:
          $ref: '#/components/schemas/ixsApprovals'
          description: Contract approvals needed to be signed before listing. This is for delegating MagicEden to move user's
            assets when selling
        sellTransactionsToSign:
          type: array
          items:
            $ref: '#/components/schemas/ixsTransactionData'
          description: Array of selling transaction data to sign. Once signed, please broadcast signed transactions to EVM
            network to finish selling
        sellDetails:
          type: object
          description: Selling details for every to-sell items
          properties:
            items:
              type: array
              items:
                type: object
                properties:
                  assetId:
                    type: string
                  orderId:
                    type: string
                    description: Which order (bid) is sold to for this asset
                  sellQuantity:
                    type: number
                    minimum: 1
                    description: How many quantity is sold to this order for this asset
                required:
                - assetId
                - orderId
                - sellQuantity
          required:
          - items
      required:
      - sellTransactionsToSign
      - sellDetails
    ixsSellGetResponse:
      oneOf:
      - $ref: '#/components/schemas/ixsBaseErrorResponse'
      - $ref: '#/components/schemas/ixsSellGetSuccessResponse'
    filterOrderSourceEnum:
